name: Recovery Build Android 15 Latest

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cleanup & Maximize Space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
        sudo docker image prune -a -f

    - name: Install Essential Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential zip curl scons libncurses5-dev git-core gnupg flex bison gperf libxml2-utils libssl-dev libcurl4-openssl-dev liblz4-tool python3 python-is-python3 openjdk-17-jdk m4 xsltproc unzip

    - name: Install Repo
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Sync TWRP Source
      run: |
        mkdir work && cd work
        repo init --u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-14 --depth=1
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Clone Device Tree
      run: |
        cd work
        git clone ${{ github.server_url }}/${{ github.repository }} device/tecno/li9

    - name: Execute Build
      run: |
        cd work
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        source build/envsetup.sh
        lunch twrp_li9-trunk_staging-eng || lunch twrp_li9-ap2a-eng || lunch twrp_li9-eng
        mka recoveryimage -j$(nproc --all)

    - name: Upload TWRP
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-li9-Android15
        path: work/out/target/product/li9/recovery.img
