name: Recovery Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Sync TWRP Sources
      run: |
        mkdir work && cd work
        repo init --u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-14
        repo sync -j$(nproc --all)

    - name: Add Device Tree
      run: |
        cd work
        git clone ${{ github.server_url }}/${{ github.repository }} device/tecno/li9

    - name: Build Recovery
      run: |
        cd work
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch twrp_li9-eng
        mka recoveryimage -j$(nproc --all)

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Pova6Pro
        path: work/out/target/product/li9/recovery.img
